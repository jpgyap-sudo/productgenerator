# Product Image Studio — render.abcx124.xyz
server {
    server_name render.abcx124.xyz;

    client_max_body_size 100m;

    # Serve static assets from VPS
    location /vps-assets/ {
        alias /root/productgenerator/vps-assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # Product Image Studio (Docker, port 3002) — /studio/* subpath
    location /studio/ {
        rewrite ^/studio/(.*) /$1 break;
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Proxy everything to Express on port 3000 (SuperRoo Cloud Dashboard)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/render.abcx124.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/render.abcx124.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = render.abcx124.xyz) {
        return 301 https://$host$request_uri;
    }

    server_name render.abcx124.xyz;

    client_max_body_size 100m;
    listen 80;
    return 404;
}
