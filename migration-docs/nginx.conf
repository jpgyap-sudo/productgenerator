# nginx config for render.abcx124.xyz
# Place at: /etc/nginx/sites-available/render.abcx124.xyz

server {
    listen 80;
    server_name render.abcx124.xyz;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name render.abcx124.xyz;

    # SSL — update paths if not using Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/render.abcx124.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/render.abcx124.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers (replaces Vercel headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Large file uploads (PDF + ZIP agent uploads)
    client_max_body_size 200M;

    # Increase timeouts for long AI render jobs
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 60s;

    # Serve local rendered assets directly (bypass Express for speed)
    location /vps-assets/ {
        alias /var/www/productgenerator/vps-assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Proxy all API calls to Express
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve index.html for all other routes (SPA fallback)
    location / {
        root  /var/www/productgenerator;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
